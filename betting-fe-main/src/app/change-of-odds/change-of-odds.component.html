<app-page-template>

  <div class="mg-stats-page container-fluid">

    <!-- HEADER COME LA DASHBOARD -->
    <div class="row align-items-center mb-3 mg-header-row">
      <div class="col-md-8">
        <div class="mg-page-kicker">
          <i class="fa fa-chart-line mr-1"></i> Statistiche
        </div>
        <h2 class="mg-page-title">
          Statistiche MG BET
        </h2>
        <p class="mg-page-subtitle">
          Andamento delle quote per la squadra: {{ nomeSquadra }}
        </p>
      </div>

      <div class="col-md-4 text-md-right text-left mt-3 mt-md-0">
        <button
          class="btn mg-refresh-btn"
          (click)="getGraph()">
          <i class="fa fa-sync-alt mr-1"></i>
          Aggiorna
        </button>
      </div>
    </div>

    <!-- CARD PRINCIPALE (STILE mg-stats-card) -->
    <div class="mg-stats-card">
      <div class="mg-stats-card-header">
        <div>
          <span class="mg-card-kicker">Quote trend</span>
          <h3 class="mg-card-title">
            {{ nomeSquadra }}
          </h3>
        </div>
      </div>

      <div class="mg-stats-card-body">
        <div class="row">
          <!-- GRAFICO QUOTA 1 -->
          <div class="col-12 mb-4">
            <h6 class="mg-chart-title">Andamento quota 1</h6>
            <div id="chartdivUno" class="mg-chart-container"></div>
          </div>

          <!-- GRAFICO QUOTA X -->
          <div class="col-12 mb-4">
            <h6 class="mg-chart-title">Andamento quota X</h6>
            <div id="chartdivX" class="mg-chart-container"></div>
          </div>

          <!-- GRAFICO QUOTA 2 -->
          <div class="col-12 mb-2">
            <h6 class="mg-chart-title">Andamento quota 2</h6>
            <div id="chartdivDue" class="mg-chart-container"></div>
          </div>
        </div>
      </div>
    </div>

  </div>

  <ngx-ui-loader></ngx-ui-loader>
</app-page-template>
