<app-page-template>

  <button class=""></button>


  <div *ngFor="let f of historyRaddoppio | async; let i = index">

  <div class="card-collapsible col-md-12"  *ngIf="f.odds" >
    <div class="card-header font-weight-bold bg-dark text-white">
      <h5 class="card-title">
        <a href="#collapse-{{i}}" class="card-toggler d-flex align-items-center collapsed" data-toggle="collapse"
           aria-expanded="false" aria-controls="collapse-1">
          Raddoppio del {{f.dataRaddoppio}}<i class="fa fa-chevron-down ml-2"></i>
        </a>
      </h5>
    </div>
    <div id="collapse-{{i}}" class="collapse">
      <div class="card-body">
        <div class="table-responsive">
          <table class="table table-dark table-bordered">
            <thead>
            <tr>
              <th scope="col">Campionato</th>
              <th scope="col">Data evento</th>
              <th scope="col">Team</th>
              <th scope="col">Esito finale</th>
              <th scope="col">Quota</th>
            </tr>
            </thead>
            <tbody>
            <tr *ngFor="let p of f.odds" [ngClass]="{'bg-success':f.preso,'bg-danger':!f.preso}" >
              <td>{{p.campionato}}</td>
              <td>{{p.dateMatch}}</td>
              <td>{{p.team}}</td>
              <td>{{p.prediction}}</td>
              <td>{{p.quota}}</td>
            </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  </div>
  <ngx-ui-loader></ngx-ui-loader>
</app-page-template>
