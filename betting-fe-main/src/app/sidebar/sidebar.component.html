<nav class="navbar navbar-expand-lg mg-navbar">
  <div class="container-fluid">

    <!-- Brand -->
    <a class="navbar-brand d-flex align-items-center" [routerLink]="'/home'">
      <div class="brand-logo-wrapper d-flex align-items-center justify-content-center">
        <img src="assets/images/MGBET-outline.png" alt="MG BET" class="brand-logo img-fluid">
      </div>
      <div class="brand-text ml-2">
        <div class="brand-title">MG BET</div>
        <div class="brand-subtitle">Smart Betting Panel</div>
      </div>
    </a>

    <!-- Mobile toggler -->
    <button class="navbar-toggler" type="button"
            data-toggle="collapse" data-target="#mgNavbar"
            aria-controls="mgNavbar" aria-expanded="false"
            aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>

    <!-- Links -->
    <div class="collapse navbar-collapse" id="mgNavbar">
      <ul class="navbar-nav ml-3">
        <li class="nav-item" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
          <a class="nav-link mg-nav-link" [routerLink]="'/home'">
            <i class="fa fa-home mr-1"></i>
            <span>Raddoppio del giorno</span>
          </a>
        </li>

        <li class="nav-item" routerLinkActive="active">
          <a class="nav-link mg-nav-link" [routerLink]="'/genera-schedina'">
            <i class="fa fa-dice mr-1"></i>
            <span>Schedina casuale</span>
          </a>
        </li>

        <li class="nav-item" routerLinkActive="active">
          <a class="nav-link mg-nav-link" [routerLink]="'/dashboard'">
            <i class="fa fa-chart-line mr-1"></i>
            <span>Statistiche</span>
          </a>
        </li>
      </ul>

      <!-- Right side -->
      <div class="ml-auto d-flex align-items-center mt-3 mt-lg-0">
        <span class="badge badge-pill badge-dark text-uppercase mg-expire-badge mr-2">
          <i class="fa fa-crown mr-1 text-warning"></i>
          Scadenza: {{ expire() }}
        </span>

        <a class="btn btn-sm btn-outline-warning mg-btn-rounded mr-2"
           [routerLink]="['/pagamento']"
           [queryParams]="{nuovoAbbonamento : false}">
          Rinnovo
        </a>

        <button class="btn btn-sm btn-outline-light mg-btn-rounded"
                (click)="logout()">
          Esci
        </button>
      </div>
    </div>
  </div>
</nav>
