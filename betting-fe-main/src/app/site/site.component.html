<app-page-template>
  <div>
    <button class="btn-info my-2" (click)="insert()" *ngIf="!doInsert">Inserisci nuovo campionato</button>
    <button class="btn-info my-2" (click)="listaCampionati()" *ngIf="doInsert">Lista campionati</button>
  </div>

  <div class="accordion" id="myAccordion" *ngIf="!doInsert">
    <div *ngFor="let item of data; let i = index">
      <div class="card">
        <div class="card-header" id="heading{{i}}">
          <h2 class="mb-0">
            <button class="btn btn-link" type="button" data-toggle="collapse" [attr.data-target]="'#collapse' + i" aria-expanded="true" [attr.aria-controls]="'collapse' + i" [style]="'color: black;'">
              {{item.territorio}}
            </button>
          </h2>
        </div>

        <div [attr.id]="'collapse' + i" class="collapse" [attr.aria-labelledby]="'heading' + i" data-parent="#myAccordion">
          <div class="card-body">
            <ul>
              <li *ngFor="let site of item.sites">
                <button class="btn btn-link" (click)="showDetails(site,item.territorio)">{{site.campionato}}</button>
              </li>
            </ul>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div *ngIf="selectedSite" class="card">
    <div class="card-header font-weight-bold text-light bg-dark">
      <h2>Dettagli del sito:</h2>
    </div>
    <div class="card-body">
      <p><strong>Nazione:</strong> {{selectedTerritory}}</p>
      <p><strong>Campionato:</strong> {{selectedSite.campionato}}</p>
      <p><strong>URL:</strong> {{selectedSite.url}}</p>
      <p><strong>Attivo:</strong> {{selectedSite.active}}</p>
      <button *ngIf="selectedSite.active" class="btn-danger my-1 my-sm-0" (click)="deactivate()">Disattiva</button>
      <button *ngIf="!selectedSite.active" class="btn-success my-1 my-sm-0" (click)="activeLink()" >Attiva</button>
    </div>
  </div>



  <!-- INSERT -->


  <div class="card" *ngIf="doInsert">
    <div class="card-body">
      <form>
        <div class="form-group">
          <label for="territorio">Territorio</label>
          <input type="text" class="form-control" id="territorio" name="territorio" placeholder="Inserisci il territorio" [(ngModel)]="territorio">
        </div>
        <div class="form-group">
          <label for="campionato">Campionato</label>
          <input type="text" class="form-control" id="campionato" name="campionato" placeholder="Inserisci il campionato" [(ngModel)]="campionato">
        </div>
        <div class="form-group">
          <label for="url">Link</label>
          <input type="url" class="form-control" id="url" name="url" placeholder="Inserisci il link" [(ngModel)]="link">
        </div>
        <div class="form-group">
          <label for="active">Active</label>
          <select class="form-control" id="active" name="active" [(ngModel)]="active">
            <option value="true">Attivo</option>
            <option value="false">Non attivo</option>
          </select>
        </div>
        <button type="submit" class="btn btn-primary" (click)="save()">Invia</button>
      </form>
    </div>
  </div>







</app-page-template>
